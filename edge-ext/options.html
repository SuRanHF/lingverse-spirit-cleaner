<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>神识清理 · 设置</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#e8e0d0;font:14px/1.6 "Microsoft YaHei","PingFang SC",sans-serif}
.container{max-width:700px;margin:0 auto;padding:24px 16px}
h1{font-size:22px;font-weight:800;background:linear-gradient(135deg,#dbb970,#f5d78a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:24px}
.section{margin-bottom:20px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:18px}
.section-title{font-size:15px;font-weight:700;color:#dbb970;margin-bottom:14px;padding-left:10px;border-left:3px solid #dbb970}
.row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.row:last-child{border-bottom:0}
.label{font-size:13px;color:#cfc6b2;flex:1}
input[type=text],input[type=password],input[type=number],select{width:180px;padding:7px 10px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#e8e0d0;font-size:13px}
input[type=checkbox]{width:18px;height:18px;cursor:pointer}
.btn-row{display:flex;gap:10px;margin-top:20px;justify-content:center}
.btn{padding:8px 28px;border:0;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700}
.btn-save{background:linear-gradient(135deg,#dbb970,#f5d78a);color:#17141d}
.btn-save:hover{opacity:.9}
.status{margin-top:10px;text-align:center;font-size:12px;color:#9be7c3;min-height:18px}
.footer{text-align:center;padding:20px;color:#4a4550;font-size:12px}
</style>
</head>
<body>
<div class="container">
<h1>⚙ 神识清理 · 设置</h1>

<div class="section">
<div class="section-title">🔑 自动登录</div>
<div class="row"><span class="label">启用自动登录</span><input type="checkbox" id="autoLoginEnabled"></div>
<div class="row"><span class="label">道籍邮箱</span><input type="text" id="autoLoginEmail" placeholder="例: 123@qq.com"></div>
<div class="row"><span class="label">登录密码</span><input type="password" id="autoLoginPassword" placeholder="登录密码"></div>
</div>

<div class="section">
<div class="section-title">🍀 气运维持</div>
<div class="row"><span class="label">自动维持</span><input type="checkbox" id="autoMaintainLuck"></div>
<div class="row"><span class="label">最低气运</span><input type="number" id="minLuck" min="1" max="10"></div>
<div class="row"><span class="label">消耗方式</span><select id="luckRefreshMethod"><option value="stone">灵石</option><option value="ad">仙缘</option></select></div>
</div>

<div class="section">
<div class="section-title">🌾 灵田</div>
<div class="row"><span class="label">自动收获</span><input type="checkbox" id="farmAutoHarvest"></div>
<div class="row"><span class="label">自动种植</span><input type="checkbox" id="farmAutoPlant"></div>
<div class="row"><span class="label">种子ID</span><input type="text" id="farmSeedId" placeholder="种子templateId"></div>
<div class="row"><span class="label">检测间隔(秒)</span><input type="number" id="farmInterval" min="5"></div>
</div>

<div class="section">
<div class="section-title">🧪 洗炼石</div>
<div class="row"><span class="label">自动升品</span><input type="checkbox" id="washStoneUpgradeRunning"></div>
<div class="row"><span class="label">检测间隔(秒)</span><input type="number" id="washStoneMonitorInterval" min="10"></div>
</div>

<div class="section">
<div class="section-title">💊 涅槃丹</div>
<div class="row"><span class="label">自动使用</span><input type="checkbox" id="autoNirvanaPill"></div>
<div class="row"><span class="label">最低品质</span><select id="nirvanaRarity"><option value="1">普通</option><option value="2">优良</option><option value="3">稀有</option><option value="4">史诗</option><option value="5">传说</option></select></div>
</div>

<div class="section">
<div class="section-title">📱 通知 & 统计</div>
<div class="row"><span class="label">企微通知</span><input type="checkbox" id="wecomNotify"></div>
<div class="row"><span class="label">企微 Webhook</span><input type="text" id="wecomNotifyWebhook" placeholder="https://qyapi.weixin.qq.com/..."></div>
<div class="row"><span class="label">在线统计端点</span><input type="text" id="onlineStatsEndpoint" placeholder="https://..."></div>
</div>

<div class="btn-row">
<button class="btn btn-save" onclick="saveAll()">💾 保存设置</button>
</div>
<div class="status" id="status"></div>

<div class="footer">神识清理 v1.6.5 · 扩展版</div>
</div>
<script src="options.js"></script>
</body>
</html>
